<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Payment Gateway - Shopping Site</title>
    <link rel="stylesheet" href="shopping.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css" />
    <style>
        #payment-form {
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            border: 1px solid #e8f6e8;
            background-color: #fff;
            border-radius: 8px;
        }
        #payment-form h2 {
            color: #088178;
            margin-bottom: 20px;
            font-weight: 700;
            text-align: center;
        }
        #payment-form label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #2b2b2b;
        }
        #payment-form input[type="text"],
        #payment-form input[type="number"],
        #payment-form input[type="month"] {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 20px;
            border: 1px solid #e1e1e1;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s ease;
        }
        #payment-form input[type="text"]:focus,
        #payment-form input[type="number"]:focus,
        #payment-form input[type="month"]:focus {
            border-color: #088178;
        }
        #payment-form button {
            background-color: #088178;
            color: #fff;
            font-weight: 700;
            padding: 15px 30px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s ease;
        }
        #payment-form button:hover {
            background-color: #05614d;
        }
    </style>
</head>
<body>
    <section id="header">
        <a href="#"><img src="image/dragon.png" alt="Logo" class="logo" style="width: 80px; height: 50px;" /></a>
        <ul id="navbar">
            <li><a href="shopping.html">Home</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="blog.html">Blog</a></li>
            <li><a href="about.html">About us</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li id="user-nav-item"><a href="signup.html">Sign Up / Login</a></li>
            <li id="lg-bag"><a href="cart.html"><i class="fa fa-shopping-cart"></i></a></li>
        </ul>
    </section>

    <main>
        <section id="order-summary" style="max-width: 600px; margin: 40px auto 20px auto; padding: 20px; border: 1px solid #e8f6e8; background-color: #f9f9f9; border-radius: 8px;">
            <h2>Order Summary</h2>
            <table id="order-table" style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr>
                        <th style="border-bottom: 1px solid #ddd; padding: 8px;">Image</th>
                        <th style="border-bottom: 1px solid #ddd; padding: 8px;">Product</th>
                        <th style="border-bottom: 1px solid #ddd; padding: 8px;">Price</th>
                        <th style="border-bottom: 1px solid #ddd; padding: 8px;">Quantity</th>
                        <th style="border-bottom: 1px solid #ddd; padding: 8px;">Subtotal</th>
                    </tr>
                </thead>
                <tbody id="order-items">
                    <!-- Order items will be populated here -->
                </tbody>
            </table>
            <h3 style="text-align: right; margin-top: 10px;">Total: $<span id="order-total">0.00</span></h3>
        </section>

        <form id="payment-form" action="#" method="post" style="max-width: 400px; margin: 0 auto;">
            <h2>Payment Details</h2>

            <label for="card-name">Name on Card</label>
            <input type="text" id="card-name" name="cardName" placeholder="Enter name on card" required />

            <label for="card-number">Card Number</label>
            <input type="text" id="card-number" name="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19" required />

            <label for="expiry-date">Expiry Date</label>
            <input type="month" id="expiry-date" name="expiryDate" required />

            <label for="cvv">CVV</label>
            <input type="number" id="cvv" name="cvv" placeholder="123" maxlength="4" required />

            <button type="submit">Pay Now</button>
        </form>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const loggedInUser = localStorage.getItem("loggedInUser");
            const userNavItem = document.getElementById("user-nav-item");

            if (loggedInUser) {
                userNavItem.innerHTML = `
                    <span>Welcome, ${loggedInUser}</span> | <a href="#" id="logout-link">Logout</a>
                `;

                document.getElementById("logout-link").addEventListener("click", function (e) {
                    e.preventDefault();
                    localStorage.removeItem("loggedInUser");
                    window.location.href = "signup.html";
                });
            } else {
                userNavItem.innerHTML = `<a href="signup.html">Sign Up / Login</a>`;
            }

            // Populate order summary from localStorage cart
            let cartItems = JSON.parse(localStorage.getItem("cart")) || [];
            const orderItemsContainer = document.getElementById("order-items");
            const orderTotalElement = document.getElementById("order-total");
            let totalAmount = 0;

            cartItems.forEach(item => {
                const subtotal = parseFloat(item.price.replace("$", "")) * item.quantity;
                totalAmount += subtotal;

                const row = document.createElement("tr");
                row.innerHTML = `
                    <td style="border-bottom: 1px solid #ddd; padding: 8px;"><img src="${item.image}" width="50"></td>
                    <td style="border-bottom: 1px solid #ddd; padding: 8px;">${item.name}</td>
                    <td style="border-bottom: 1px solid #ddd; padding: 8px;">${item.price}</td>
                    <td style="border-bottom: 1px solid #ddd; padding: 8px;">${item.quantity}</td>
                    <td style="border-bottom: 1px solid #ddd; padding: 8px;">$${subtotal.toFixed(2)}</td>
                `;
                orderItemsContainer.appendChild(row);
            });

            orderTotalElement.textContent = totalAmount.toFixed(2);

            document.getElementById("payment-form").addEventListener("submit", function (e) {
                e.preventDefault();
                alert("Payment successful! Redirecting to order confirmation.");
                window.location.href = "confirmation.html";
            });
        });
    </script>
</body>
</html>
